<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cris and the Pets</title>
  <meta name="description" content="Pet Sitter professionnelle à Grenoble. 6 ans d'expérience. Visites à domicile, promenades, garde. Fluente en français, portugais et… miaou." />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;700;800&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Bubblegum+Sans&family=Covered+By+Your+Grace&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- Section placeholders - will be loaded dynamically -->
  <div id="hero-section"></div>
  <div id="services-section"></div>
  <div id="about-section"></div>
  <div id="temoignages-section"></div>
  <div id="zone-section"></div>
  <div id="contact-section"></div>

  <!-- ===== FOOTER ===== -->
  <footer class="footer">
    <div class="container footer-inner">
      <!-- <div class="footer-logo">Cris & the Pets</div> -->
        <div class="logo"> <img src="images/logo-white.png" alt="Cris & the Pets logo"> </div>
      <p>Pet Sitter à Grenoble · 6 ans d'expérience · 3 langues dont le miaou</p>
      <p class="footer-small">Fait avec 💚 et beaucoup de câlins · Grenoble, France</p>
    </div>
  </footer>

  <script>
    // Function to load HTML content into a container
    async function loadSection(containerId, fileName) {
      try {
        const response = await fetch(fileName);
        if (response.ok) {
          const content = await response.text();
          document.getElementById(containerId).innerHTML = content;
        } else {
          console.error(`Failed to load ${fileName}`);
        }
      } catch (error) {
        console.error(`Error loading ${fileName}:`, error);
      }
    }

    // Load all sections when the page loads
    document.addEventListener('DOMContentLoaded', async function() {
      // Load all sections
      await Promise.all([
        loadSection('hero-section', 'hero.html'),
        loadSection('services-section', 'services.html'),
        loadSection('about-section', 'about.html'),
        loadSection('temoignages-section', 'temoignages.html'),
        loadSection('zone-section', 'zone.html'),
        loadSection('contact-section', 'contact.html')
      ]);

      // Reinitialize the main.js after sections are loaded
      if (typeof initializeApp === 'function') {
        initializeApp();
      }
    });
  </script>
  <script src="js/main.js"></script>
</body>
</html>
